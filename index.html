<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>victoria's website</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="container">
    <h1 id="intro-text" aria-label="hi! i'm victoria"></h1>
    <!-- <p class="tagline">just for fun ◡̈</p> -->
    <a href="postcards.html">postcards</a>
    <a href="things-ive-made.html">things i've made</a>
  </div>
  <script>
    const introText = document.getElementById("intro-text");
    const fullText = "hi! i'm victoria";
    let charIndex = 0;

    function typeNextChar() {
      if (charIndex <= fullText.length) {
        introText.textContent = fullText.slice(0, charIndex);
        charIndex += 1;
        setTimeout(typeNextChar, 95);
      }
    }

    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      introText.textContent = fullText;
    } else {
      typeNextChar();
    }
  </script>
</body>
</html>
